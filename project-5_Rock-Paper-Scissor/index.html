<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <p class="title">Rock Paper Scissors</p>

    <button onclick="

        const computerMove = pickComputerMove();
    
        playGame('rock');

        " class="move-button"><img src="images\rock.png" class="move-icon"></button>

    <button onclick="

        const computerMove = pickComputerMove();
        
        playGame('paper');

        " class="move-button"><img src="images\paper.png" class="move-icon"></button>


    <button onclick="

        const computerMove = pickComputerMove();
        
        playGame('scissors');

        " class="move-button"><img src="images\scissors.png" class="move-icon"></button>

    <p class="js-result result">You Win</p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>

    <button onclick="
        score.wins=0;
        score.losses=0;
        score.ties=0;
        localStorage.removeItem('score');
        updateScoreElement();
        " class="reset-score-button">Reset Score</button>

    <script src="script.js"></script>

</html>
